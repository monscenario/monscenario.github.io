<!doctype html>
<html lang="fr">
  {% include head.html %}
  <body>
    {% include header.html %}
    <div class="content-wrapper">
      {{ content }}
    </div>
    {% include footer.html %}

    <script>
      document.addEventListener('mousemove', (e) => {
        const haloBgs = document.querySelectorAll('.interactive-halo-bg');
        haloBgs.forEach(waveBg => {
          const rect = waveBg.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          
          const mask = `radial-gradient(circle 180px at ${x}px ${y}px, black 0%, rgba(0, 0, 0, 0.20) 100%)`;
          waveBg.style.webkitMaskImage = mask;
          waveBg.style.maskImage = mask;
        });
      });
    </script>
  </body>
</html>
