<header class="site-header" id="site-header">
  <div class="header-inner">
    <!-- Logo -->
    <a href="{{ site.github.url }}/" class="site-logo" aria-label="Scénario — Accueil" style="display:flex; align-items:center; gap:10px; text-decoration:none;">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200" height="38" style="display:block; flex-shrink:0;">
        <path d="M 30 110 Q 10 70 45 45 Q 65 32 80 38" fill="none" stroke="#111" stroke-width="9" stroke-linecap="round"/>
        <path d="M 80 38 Q 105 30 108 55 Q 110 75 88 80 Q 72 83 65 72" fill="none" stroke="#111" stroke-width="9" stroke-linecap="round"/>
        <path d="M 68 76 Q 62 110 58 150 Q 55 175 52 195" fill="none" stroke="#111" stroke-width="9" stroke-linecap="round"/>
        <path d="M 65 72 Q 70 110 72 150 Q 73 170 70 190" fill="none" stroke="#111" stroke-width="7" stroke-linecap="round" opacity="0.4"/>
      </svg>
      <span class="logo-text" style="font-size:1.1rem; letter-spacing:0.12em; font-weight:700; color:#111;">SCÉNARIO</span>
    </a>

    <!-- Desktop Navigation -->
    <nav class="menu-list" aria-label="Navigation principale">
      {% for item in site.data.settings.menu %}
        <a href="{{ site.github.url }}/{{ item.url }}" class="menu-link {% if page.url contains item.url %}active{% endif %}">{{ item.name | upcase }}</a>
      {% endfor %}
    </nav>

    <!-- Right Side (Contact, etc) -->
    <div class="header-right">
    </div>

    <!-- Mobile dropdown -->
    <div class="dropdown" aria-label="Menu mobile">
      <button class="dropbtn" aria-label="Ouvrir le menu">
        <i class="fa fa-bars" aria-hidden="true" style="color: #000;"></i>
      </button>
      <div class="dropdown-content">
        {% for item in site.data.settings.menu %}
          <a href="{{ site.github.url }}/{{ item.url }}" class="menu-link">{{ item.name | upcase }}</a>
        {% endfor %}
      </div>
    </div>
  </div>
</header>

<script>
  // Scroll effect on header
  (function() {
    var header = document.getElementById('site-header');
    window.addEventListener('scroll', function() {
      if (window.scrollY > 30) {
        header.classList.add('scrolled');
      } else {
        header.classList.remove('scrolled');
      }
    }, { passive: true });
  })();
</script>
