<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 340">
  <rect width="480" height="340" fill="#F5EFE6" rx="8"/>

  <!-- Topographic contour lines — inspired by the pitch deck watercolor pattern -->
  <path d="M 60 170 Q 120 100 200 120 Q 280 140 340 100 Q 400 60 450 90" fill="none" stroke="#C4622D" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <path d="M 40 195 Q 110 130 190 150 Q 270 170 335 128 Q 395 88 455 115" fill="none" stroke="#C4622D" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M 30 220 Q 100 160 185 178 Q 265 196 330 155 Q 392 115 458 140" fill="none" stroke="#C4622D" stroke-width="2" stroke-linecap="round" opacity="0.35"/>

  <path d="M 20 248 Q 90 200 170 215 Q 255 232 330 195 Q 395 162 462 185" fill="none" stroke="#E8963C" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M 15 272 Q 85 230 165 244 Q 248 258 328 224 Q 396 194 465 215" fill="none" stroke="#E8963C" stroke-width="2" stroke-linecap="round" opacity="0.35"/>

  <path d="M 50 140 Q 130 80 210 98 Q 285 114 348 75 Q 408 40 460 65" fill="none" stroke="#4A8B7D" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <path d="M 70 118 Q 148 62 225 80 Q 298 96 358 58" fill="none" stroke="#4A8B7D" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- Globe outline -->
  <circle cx="240" cy="175" r="115" fill="none" stroke="#111" stroke-width="1.5" opacity="0.15"/>
  <ellipse cx="240" cy="175" rx="50" ry="115" fill="none" stroke="#111" stroke-width="1" opacity="0.1"/>
  <ellipse cx="240" cy="175" rx="115" ry="35" fill="none" stroke="#111" stroke-width="1" opacity="0.1"/>

  <!-- Resource dots -->
  <circle cx="310" cy="130" r="8" fill="#C4622D" opacity="0.85"/>
  <text x="322" y="135" font-family="Inter,sans-serif" font-size="10" fill="#C4622D" font-weight="600">Li</text>

  <circle cx="175" cy="155" r="8" fill="#5BA0C8" opacity="0.85"/>
  <text x="187" y="160" font-family="Inter,sans-serif" font-size="10" fill="#5BA0C8" font-weight="600">Cu</text>

  <circle cx="260" cy="200" r="8" fill="#4A8B7D" opacity="0.85"/>
  <text x="272" y="205" font-family="Inter,sans-serif" font-size="10" fill="#4A8B7D" font-weight="600">Co</text>

  <circle cx="195" cy="210" r="6" fill="#E8963C" opacity="0.8"/>
  <circle cx="330" cy="175" r="5" fill="#C4622D" opacity="0.6"/>
  <circle cx="150" cy="185" r="5" fill="#5BA0C8" opacity="0.6"/>

  <!-- Connection lines between dots -->
  <line x1="310" y1="130" x2="260" y2="200" stroke="#111" stroke-width="1" opacity="0.12" stroke-dasharray="4 3"/>
  <line x1="175" y1="155" x2="260" y2="200" stroke="#111" stroke-width="1" opacity="0.12" stroke-dasharray="4 3"/>
  <line x1="310" y1="130" x2="175" y2="155" stroke="#111" stroke-width="1" opacity="0.12" stroke-dasharray="4 3"/>
</svg>
